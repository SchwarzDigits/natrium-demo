trigger:
    batch: true
resources:
    repositories:
        - repository: templates
          type: git
          ref: refs/heads/master
          name: schwarzit.odj-pipeline-templates/odj-deliver-templates
variables:
    - group: odj-technical-product-properties
    - group: odj-component-natrium-showcase-properties
extends:
    template: templates/technologies/java-gradle/v2/odj-pipeline-template-technology-java-gradle.yml@templates
    parameters:
        odj_devenv_artifact_repository: # Managed by ODJ, do not modify
            - artifactory_saas
        odj_devenv_dependency_scanner: # Managed by ODJ, do not modify
            - snyk_saas_dependency
            - snyk_saas_dockerfile
        odj_devenv_pipeline: azuredevops # Managed by ODJ, do not modify
        odj_devenv_code_repository: azuredevops # Managed by ODJ, do not modify
        odj_runenv_runtime: k8s # Managed by ODJ, do not modify
        odj_runenv_provider: stackit # Managed by ODJ, do not modify
        odj_runenv_component_type: library # Managed by ODJ, do not modify
        productive_branch: refs/heads/main # Managed by ODJ, do not modify
        ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
            odj_deploy_stages:
                - prod
        odj_devenv_static_code_analysis:
            - sonarqube_saas
            - hadolint_dockerfile
            - opa_dockerfile
